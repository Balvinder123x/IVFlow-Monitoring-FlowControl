{% extends "base.html" %}
{% block title %}Settings{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto px-4 py-8">
    <h1 class="text-3xl font-bold mb-6">System Settings</h1>
    <div class="card space-y-6">
        <div><label class="block text-sm font-medium mb-1">Default Target Flow Rate (mL/hr)</label><input type="number" id="defaultFlow" value="100" class="w-full px-3 py-2 rounded-lg border"></div>
        <div><label class="block text-sm font-medium mb-1">Low Fluid Alert Threshold (mL)</label><input type="number" id="lowThreshold" value="150" class="w-full px-3 py-2 rounded-lg border"></div>
        <div><label class="block text-sm font-medium mb-1">Critical Fluid Threshold (mL)</label><input type="number" id="criticalThreshold" value="50" class="w-full px-3 py-2 rounded-lg border"></div>
        <div class="flex items-center justify-between"><label class="text-sm font-medium">Enable Push Notifications</label><input type="checkbox" id="notifications" checked class="w-5 h-5 text-green-500"></div>
        <button id="saveBtn" class="w-full bg-green-500 text-white py-2 rounded-lg hover:bg-green-600 transition">Save Settings</button>
    </div>
</div>
<script>
    // Load saved settings from localStorage
    const settings = JSON.parse(localStorage.getItem('settings')) || {};
    if (settings.defaultFlow) document.getElementById('defaultFlow').value = settings.defaultFlow;
    if (settings.lowThreshold) document.getElementById('lowThreshold').value = settings.lowThreshold;
    if (settings.criticalThreshold) document.getElementById('criticalThreshold').value = settings.criticalThreshold;
    if (settings.notifications !== undefined) document.getElementById('notifications').checked = settings.notifications;

    document.getElementById('saveBtn').addEventListener('click', () => {
        const newSettings = {
            defaultFlow: document.getElementById('defaultFlow').value,
            lowThreshold: document.getElementById('lowThreshold').value,
            criticalThreshold: document.getElementById('criticalThreshold').value,
            notifications: document.getElementById('notifications').checked
        };
        localStorage.setItem('settings', JSON.stringify(newSettings));
        alert('Settings saved!');
        // Optionally send to backend to apply thresholds
        fetch('/control', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ command: 'SET_THRESHOLDS', value: newSettings })
        });
    });
</script>
{% endblock %}
